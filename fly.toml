app = "customcards"
primary_region = "sjc"

[build]

[deploy]
  # db:prepare runs migrations; db:seed is handled by docker-entrypoint on first boot
  release_command = "bin/rails db:prepare"

[env]
  RAILS_LOG_LEVEL    = "info"
  SOLID_QUEUE_IN_PUMA = "true"

[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

# Persistent volume keeps SQLite databases and Active Storage files across deploys
[[mounts]]
  source      = "customcards_storage"
  destination = "/rails/storage"
  initial_size = "1gb"
